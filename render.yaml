services:
  - type: web
    name: smc-quest-miniapp
    env: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python -c "import matplotlib.font_manager; print('matplotlib font cache built')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false         # set manually in Render dashboard
      - key: WEBHOOK_URL
        value: https://smc-quest-miniapp.onrender.com
      - key: ADMIN_ID
        sync: false         # set manually in Render dashboard
      - key: ADMIN_CHANNEL_ID
        sync: false         # set manually in Render dashboard (group/channel ID)
      - key: DATA_DIR
        value: /tmp
      - key: CHM_MODULE_REWARD
        value: "50"
      - key: CHM_BOSS_REWARD
        value: "200"
      - key: CHM_DAILY_STREAK_MAX
        value: "500"
      - key: CHM_REFERRAL_REWARD
        value: "100"
      - key: CHM_PVP_WIN_REWARD
        value: "30"
      - key: CHM_ROULETTE_BURN_PCT
        value: "0.20"
      - key: SESSION_STRICT
        value: "false"
